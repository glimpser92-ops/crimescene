<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#060611" />
  <title>과학실의 소동 — 참가</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    body { overflow-x: hidden; }
    #app { max-width: 560px; margin: 0 auto; padding: 18px 16px 90px; min-height: 100dvh; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* 입장 화면 */
    .hero { text-align: center; padding: 36px 0 22px; }
    .hero .badge { font-size: 2.4rem; margin-bottom: 8px; }
    .hero h1 { font-size: 2.1rem; line-height: 1.25; }
    .hero .sub { color: var(--text-dim); margin-top: 8px; font-size: 0.95rem; }
    .join-box { padding: 22px; margin-top: 10px; }
    .join-box .input { text-align: center; }
    #inp-code { text-transform: uppercase; letter-spacing: 0.35em; font-family: 'Black Han Sans'; font-size: 1.5rem; }

    /* 대기실 */
    .lobby-count { font-size: 3rem; }
    .player-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
    .player-tag {
      padding: 6px 14px; border-radius: 20px; font-size: 0.9rem;
      border: 1px solid var(--line-dim); background: var(--panel-2);
    }
    .player-tag.me { border-color: var(--cyan); box-shadow: var(--glow-c); color: var(--cyan); font-weight: 700; }
    .player-tag.off { opacity: 0.4; }
    .player-tag.bot {
      border-color: rgba(180, 76, 255, 0.5);
      color: #dca8ff;
      background: rgba(180, 76, 255, 0.12);
      box-shadow: inset 0 0 12px rgba(180, 76, 255, 0.16);
      font-weight: 700;
    }

    /* 역할 카드 플립 */
    .flip-scene { perspective: 1200px; margin: 24px 0; }
    .flip-card { position: relative; width: 100%; min-height: 300px; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(.2,.8,.2,1); cursor: pointer; }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 26px; }
    .flip-front { background: var(--panel); border: 1px solid var(--purple); box-shadow: var(--glow-p); }
    .flip-back { transform: rotateY(180deg); background: var(--panel); border: 1px solid var(--cyan); box-shadow: var(--glow-c); }

    /* 메인 탭 */
    .tabbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
      display: flex; justify-content: center; gap: 6px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(6, 6, 17, 0.94);
      border-top: 1px solid var(--line-dim);
      backdrop-filter: blur(10px);
    }
    .tabbar button {
      flex: 1; max-width: 130px;
      padding: 10px 4px; border-radius: 10px;
      background: transparent; border: 1px solid transparent;
      color: var(--text-dim); font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer;
    }
    .tabbar button .ico { display: block; font-size: 1.25rem; margin-bottom: 2px; }
    .tabbar button.active { color: var(--cyan); border-color: var(--line); background: rgba(40, 224, 255, 0.07); }
    .tabbar button .dot { display: none; color: var(--red); }
    .tabbar button.alert .dot { display: inline; }

    .phase-banner { padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .phase-banner .name { font-weight: 900; color: var(--cyan); }
    .phase-banner .timer-display { font-size: 1.4rem; }

    .section { margin-bottom: 16px; padding: 18px; }
    .section h2 { font-size: 1.05rem; margin-bottom: 10px; color: var(--cyan); }
    .section h2.p { color: #dca8ff; }
    .section ul { padding-left: 20px; line-height: 1.7; font-size: 0.95rem; }
    .section p { line-height: 1.7; font-size: 0.95rem; }

    .role-banner { text-align: center; padding: 20px; margin-bottom: 16px; }
    .role-banner .emoji { font-size: 2.6rem; }
    .role-banner h2 { font-size: 1.5rem; margin: 6px 0 4px; }

    .culprit-box { border: 1px solid var(--red) !important; box-shadow: inset 0 0 30px rgba(255,59,92,.08), 0 0 18px rgba(255,59,92,.25) !important; }

    .vote-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .vote-confirm { margin-top: 14px; }
    .voted-stamp { text-align: center; padding: 26px 0 10px; }
    .voted-stamp .big { font-size: 2.2rem; }

    .result-banner { text-align: center; padding: 30px 20px; }
    .result-banner .big { font-size: 3rem; }
    .result-banner h2 { font-size: 1.7rem; margin: 10px 0; }

    .host-paced {
      min-height: 58dvh;
      padding: 42px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
      background:
        linear-gradient(160deg, rgba(40, 224, 255, 0.08), rgba(180, 76, 255, 0.08)),
        var(--panel);
    }

    .host-paced .paced-icon {
      font-size: 3.6rem;
      filter: drop-shadow(0 0 18px rgba(40, 224, 255, 0.45));
    }

    .host-paced h2 {
      color: var(--cyan);
      font-size: 1.55rem;
      margin-top: 4px;
    }

    .host-paced p {
      max-width: 340px;
      color: var(--text-dim);
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .student-map {
      padding: 18px;
      margin-bottom: 16px;
      background:
        linear-gradient(135deg, rgba(40, 224, 255, 0.08), rgba(180, 76, 255, 0.05)),
        var(--panel);
      overflow: hidden;
    }

    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .map-head h2 {
      color: var(--cyan);
      font-size: 1.35rem;
      margin-top: 10px;
    }

    .map-head p {
      line-height: 1.5;
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .map-status {
      flex: 0 0 auto;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--green);
      color: var(--green);
      background: rgba(60, 255, 158, 0.1);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      box-shadow: 0 0 12px rgba(60, 255, 158, 0.25);
    }

    .student-zone-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .student-zone {
      min-height: 116px;
      padding: 12px 10px;
      border: 1px solid var(--line-dim);
      border-radius: 12px;
      background: rgba(10, 12, 30, 0.58);
      display: flex;
      flex-direction: column;
      gap: 5px;
      justify-content: center;
      text-align: center;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .student-zone.open:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(40, 224, 255, 0.22);
      transform: translateY(-1px);
    }

    .student-zone.locked {
      cursor: not-allowed;
      opacity: 0.48;
      filter: grayscale(0.45);
    }

    .student-zone.live-zone {
      border-color: var(--green);
      box-shadow: 0 0 16px rgba(60, 255, 158, 0.24);
    }

    .student-zone.selected {
      border-color: var(--cyan);
      background: rgba(40, 224, 255, 0.09);
    }

    .student-zone.suspect-zone {
      border-color: rgba(180, 76, 255, 0.35);
      background: rgba(180, 76, 255, 0.07);
    }

    .student-zone .zone-emoji {
      font-size: 1.8rem;
      line-height: 1;
    }

    .student-zone b {
      font-size: 0.9rem;
      color: var(--text);
    }

    .student-zone span {
      color: var(--text-dim);
      font-size: 0.75rem;
      line-height: 1.35;
    }

    .student-zone em {
      margin-top: 3px;
      color: var(--green);
      font-size: 0.68rem;
      font-style: normal;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .student-zone.locked em {
      color: var(--text-dim);
    }

    .map-back-btn {
      width: 100%;
      margin: -2px 0 12px;
    }

    .student-zone-clues {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .student-zone-clue {
      position: relative;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      padding: 12px;
      border: 1px solid var(--line-dim);
      border-radius: 12px;
      background: rgba(10, 12, 30, 0.62);
    }

    .student-zone-clue .clue-pin {
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      background: var(--cyan);
      box-shadow: var(--glow-c);
      font-weight: 900;
    }

    .student-zone-clue b {
      display: block;
      margin-bottom: 5px;
      color: var(--cyan);
      font-size: 0.96rem;
    }

    .student-zone-clue p {
      color: var(--text-dim);
      line-height: 1.55;
      font-size: 0.86rem;
    }

    .student-zone-clue .evidence-photo {
      margin-top: 0;
    }

    .revealed-strip {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-top: 12px;
      margin-top: 3px;
    }

    .revealed-strip button {
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line-dim);
      background: rgba(10, 12, 30, 0.72);
      color: var(--text-dim);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }

    .revealed-strip button.selected {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(40, 224, 255, 0.08);
    }

    @media (max-width: 430px) {
      .student-zone-clue {
        flex-direction: column;
      }

      .student-zone-clue .clue-pin {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 2;
      }

      .student-zone-clue .evidence-photo--mini {
        width: 100%;
        flex-basis: auto;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 1) 입장 -->
    <div class="screen active" id="scr-join">
      <div class="hero">
        <div class="badge pulse-glow">🕵️</div>
        <h1 class="neon-title">과학실의 소동</h1>
        <div class="sub">'슈퍼 로봇' 파손 및 설계도 도난 사건</div>
      </div>
      <div class="panel frame join-box">
        <label class="dim" style="font-size:.85rem">방 코드</label>
        <input id="inp-code" class="input" maxlength="4" placeholder="ABCD" autocomplete="off" style="margin:8px 0 16px" />
        <label class="dim" style="font-size:.85rem">이름 (별명)</label>
        <input id="inp-name" class="input" maxlength="12" placeholder="홍길동" autocomplete="off" style="margin:8px 0 20px" />
        <button class="btn big" id="btn-join" style="width:100%">사건 현장에 입장</button>
      </div>
      <p class="center dim" style="margin-top:22px; font-size:.85rem">
        진행자이신가요? <a href="/host.html" style="color:var(--cyan)">진행자 화면 열기</a>
      </p>
    </div>

    <!-- 2) 대기실 -->
    <div class="screen" id="scr-lobby">
      <div class="hero">
        <div class="label-chip">사건 번호 <span id="lobby-code">----</span></div>
        <h1 class="neon-title" style="font-size:1.7rem; margin-top:14px">수사관 소집 중...</h1>
      </div>
      <div class="panel frame center" style="padding:24px">
        <div class="lobby-count display-font cyan" id="lobby-count">0</div>
        <div class="dim">명 입장</div>
        <div class="player-grid" id="lobby-players"></div>
      </div>
      <p class="center dim" style="margin-top:18px; font-size:.9rem">
        진행자가 역할을 배정하면 자동으로 시작됩니다.<br/>화면을 끄지 마세요!
      </p>
    </div>

    <!-- 3) 역할 공개 -->
    <div class="screen" id="scr-role">
      <div class="hero" style="padding-bottom:6px">
        <h1 class="neon-title" style="font-size:1.6rem">당신의 역할</h1>
        <div class="sub">카드를 눌러 확인하세요. <b class="red-t">주변에 보이지 않게 조심!</b></div>
      </div>
      <div class="flip-scene">
        <div class="flip-card" id="flip-card">
          <div class="flip-face flip-front">
            <div style="font-size:3.4rem">🂠</div>
            <div class="display-font" style="font-size:1.5rem; margin-top:12px">극비 문서</div>
            <div class="dim" style="margin-top:6px">눌러서 열기</div>
          </div>
          <div class="flip-face flip-back" id="flip-back"></div>
        </div>
      </div>
      <button class="btn big" id="btn-role-done" style="width:100%" disabled>확인 완료 — 수사 시작</button>
    </div>

    <!-- 4) 메인 -->
    <div class="screen" id="scr-main">
      <div class="panel phase-banner">
        <div>
          <div class="dim" style="font-size:.75rem">현재 단계</div>
          <div class="name" id="main-phase">—</div>
        </div>
        <div class="timer-display" id="main-timer"></div>
      </div>
      <div id="tab-content"></div>
    </div>

    <!-- 탭바 -->
    <nav class="tabbar" id="tabbar" style="display:none">
      <button data-tab="me" class="active"><span class="ico">🪪</span>내 정보</button>
      <button data-tab="case"><span class="ico">📁</span>사건 자료</button>
      <button data-tab="vote"><span class="ico">🗳️</span>투표 <span class="dot">●</span></button>
    </nav>
  </div>

  <div id="toast"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/clueVisuals.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
